server:
  port: 8080

spring:
  application:
    name: wsd

  datasource:
    url: jdbc:postgresql://localhost:5432/wsd_db
    username: admin
    password: password
    driver-class-name: org.postgresql.Driver

  jpa:
    database-platform: org.hibernate.dialect.PostgreSQLDialect
    hibernate:
      ddl-auto: update
    show-sql: true
    properties:
      hibernate:
        format_sql: true
        jdbc:
          batch_size: 25

# ── Algorithme d'optimisation ─────────────────────────────────────────────────
algorithm:
  # Clé OpenRouteService — https://openrouteservice.org/dev/#/signup (gratuit)
  ors:
    api-key: eyJvcmciOiI1YjNjZTM1OTc4NTExMTAwMDFjZjYyNDgiLCJpZCI6ImY3NjY1Y2U0ZDY5ZTQ3MzVhMzJjMDVlM2RiOWIzNWQ3IiwiaCI6Im11cm11cjY0In0=
    base-url: https://api.openrouteservice.org

  # Dépôt fixe (Paris)
  depot:
    latitude: 48.8566
    longitude: 2.3522

  # Seuil de réservoir en dessous duquel on cherche une station (15 %)
  fuel:
    safety-threshold-percent: 15

  # Groupage : distance max entre deux adresses pour les grouper (km vol d'oiseau)
  grouping:
    max-distance-km: 30
    # Écart max entre plages horaires pour les grouper (minutes)
    max-time-gap-minutes: 60

  price:
    driver-cost-per-km: 0.25   # part salariale chauffeur (€/km, ~15€/h à 60km/h)
    wear-cost-per-km: 0.15     # usure + entretien + amortissement camion (€/km)
    toll-cost-per-km: 0.05     # badge télépéage moyenné (€/km)
    stop-fee: 5.0              # frais fixes par livraison (chargement/déchargement, €)
    margin-rate: 0.20          # marge bénéfice entreprise (20 %)