<div class="wsd-page">
  <div class="mx-auto w-full max-w-5xl space-y-6">
    <div class="wsd-panel overflow-hidden p-6 sm:p-8">
      <div class="flex flex-wrap items-start justify-between gap-4">
        <div>
          <p class="text-sm font-medium text-[#8fa3bf]">Espace client</p>
          <h1 class="mt-1 text-3xl font-extrabold tracking-tight text-white">Wizard Speed Delivery</h1>
          <p class="mt-3 max-w-2xl text-sm text-[#8fa3bf]">
            Gérez vos commandes.
          </p>
        </div>
        <div class="flex items-center gap-3">
          <button
            type="button"
            (click)="logout()"
            class="inline-flex items-center gap-2 rounded-xl border border-[#3e3743] bg-[#3e3743] px-3 py-2 text-sm font-semibold text-[#ff6b35] transition hover:border-[#ff6b35]/50">
            <svg class="h-4 w-4" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
              <path d="M10 17l5-5-5-5" stroke-linecap="round" stroke-linejoin="round" />
              <path d="M15 12H3" stroke-linecap="round" stroke-linejoin="round" />
              <path d="M21 5v14" stroke-linecap="round" stroke-linejoin="round" />
            </svg>
            Déconnexion
          </button>
        </div>
      </div>
    </div>

    <div class="grid gap-5 md:grid-cols-2">
      <button
        type="button"
        (click)="goToNewOrder()"
        class="wsd-panel group relative overflow-hidden p-6 text-left transition hover:-translate-y-0.5">
        <span class="absolute left-0 top-0 h-full w-1 bg-[#ff6b35]"></span>
        <div class="flex items-start justify-between gap-3">
          <div>
            <h2 class="text-xl font-bold text-white">Nouvelle commande</h2>
            <p class="mt-2 text-sm text-[#8fa3bf]">Créez une demande, simulez le prix puis confirmez votre livraison.</p>
          </div>
          <div class="rounded-xl bg-[#ff6b35]/15 p-2 text-[#ff6b35]">
            <svg class="h-6 w-6" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8">
              <path d="M12 5v14M5 12h14" stroke-linecap="round" />
            </svg>
          </div>
        </div>
        <div class="mt-5 inline-flex items-center gap-2 text-sm font-semibold text-[#ff6b35]">
          Passer une commande
          <svg class="h-4 w-4" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M5 12h14m-6-6 6 6-6 6" stroke-linecap="round" stroke-linejoin="round"/></svg>
        </div>
      </button>

      <button
        type="button"
        (click)="goToPreviousOrders()"
        class="wsd-panel group relative overflow-hidden p-6 text-left transition hover:-translate-y-0.5">
        <span class="absolute left-0 top-0 h-full w-1 bg-[#2d4a7a]"></span>
        <div class="flex items-start justify-between gap-3">
          <div>
            <h2 class="text-xl font-bold text-white">Historique</h2>
            <p class="mt-2 text-sm text-[#8fa3bf]">Suivez vos commandes passées, prix validés et statuts de livraison.</p>
          </div>
          <div class="rounded-xl bg-[#2d4a7a]/25 p-2 text-[#8fa3bf]">
            <svg class="h-6 w-6" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8">
              <path d="M3 6h18M3 12h18M3 18h18" stroke-linecap="round" />
            </svg>
          </div>
        </div>
        <div class="mt-5 inline-flex items-center gap-2 text-sm font-semibold text-[#8fa3bf]">
          Voir mes commandes
          <svg class="h-4 w-4" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M5 12h14m-6-6 6 6-6 6" stroke-linecap="round" stroke-linejoin="round"/></svg>
        </div>
      </button>
    </div>
  </div>
</div>
