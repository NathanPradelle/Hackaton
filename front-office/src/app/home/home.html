<div class="min-h-screen bg-slate-100 px-4 py-10">
  <div class="mx-auto max-w-5xl">
	<div class="mb-8 rounded-2xl bg-gradient-to-r from-indigo-600 via-violet-600 to-purple-600 p-8 text-white shadow-lg">
	  <h1 class="text-3xl font-bold tracking-tight">Espace Client</h1>
	</div>

	<div class="grid gap-5 sm:grid-cols-2">
	  <button
		type="button"
		(click)="goToPreviousOrders()"
		class="rounded-2xl border border-slate-200 bg-white p-6 text-left shadow-sm transition hover:-translate-y-0.5 hover:shadow-md">
		<h2 class="text-xl font-semibold text-slate-800">Commandes precedentes</h2>
		<p class="mt-2 text-sm text-slate-600">
		  Consulter l'historique de vos commandes.
		</p>
	  </button>

	  <button
		type="button"
		(click)="goToNewOrder()"
		class="rounded-2xl border border-indigo-200 bg-indigo-50 p-6 text-left shadow-sm transition hover:-translate-y-0.5 hover:shadow-md">
		<h2 class="text-xl font-semibold text-indigo-800">Passer une commande</h2>
		<p class="mt-2 text-sm text-indigo-700">
		  Creer une nouvelle commande.
		</p>
	  </button>
	</div>
  </div>
</div>
