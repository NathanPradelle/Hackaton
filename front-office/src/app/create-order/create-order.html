<div class="min-h-screen bg-slate-100 px-4 py-10">
	<div class="mx-auto max-w-5xl">
		<div class="mb-4">
			<button (click)="goBack()" class="inline-flex items-center gap-2 text-sm font-medium text-slate-600 transition hover:text-slate-900">
				<svg class="h-4 w-4" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M19 12H5M12 19l-7-7 7-7" stroke-linecap="round" stroke-linejoin="round"/></svg>
        Retour a l'accueil
			</button>
		</div>

		<div class="mb-6 rounded-2xl bg-gradient-to-r from-indigo-600 via-violet-600 to-purple-600 p-6 text-white shadow-lg">
			<div class="flex items-start gap-3">
				<svg class="mt-1 h-6 w-6 shrink-0" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" aria-hidden="true">
					<path d="M3 6h18M7 12h10M10 18h4" stroke-linecap="round" />
				</svg>
				<div>
					<h1 class="text-2xl font-bold tracking-tight">Passer une commande</h1>
				</div>
			</div>
		</div>

		<div class="rounded-2xl bg-white p-6 shadow-sm ring-1 ring-slate-200 sm:p-8">
			<form [formGroup]="orderForm" (ngSubmit)="onSubmit()" class="grid gap-5 sm:grid-cols-2">
                <div class="space-y-1 sm:col-span-2">
                    <label for="address" class="block text-sm font-medium text-slate-700">Adresse</label>
                    <div class="relative">
                        <span class="pointer-events-none absolute left-3 top-1/2 -translate-y-1/2 text-slate-400">
                            <svg class="h-4 w-4" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M12 21s7-5.5 7-11a7 7 0 1 0-14 0c0 5.5 7 11 7 11Z"/><circle cx="12" cy="10" r="2.5"/></svg>
                        </span>
                        <input
                            id="address"
                            type="text"
                            formControlName="address"
                            placeholder="Ex: 123 rue de Paris, 75001 Paris"
                            class="w-full rounded-lg border py-2.5 pl-10 pr-3 text-sm outline-none transition focus:ring-4"
                            [ngClass]="isControlInvalid('address') ? 'border-red-400 focus:border-red-400 focus:ring-red-100' : 'border-slate-300 focus:border-indigo-500 focus:ring-indigo-100'" />
                    </div>
                    <small class="block text-xs text-red-600" *ngIf="isControlInvalid('address')">L'adresse est obligatoire (min 5 caractères).</small>
                </div>

                <div class="space-y-1">
                    <label for="requestedDate" class="block text-sm font-medium text-slate-700">Date voulue</label>
                    <div class="relative">
                        <span class="pointer-events-none absolute left-3 top-1/2 -translate-y-1/2 text-slate-400">
                            <svg class="h-4 w-4" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><rect x="3" y="5" width="18" height="16" rx="2"/><path d="M8 3v4M16 3v4M3 10h18"/></svg>
                        </span>
                        <input
                            id="requestedDate"
                            type="date"
                            formControlName="requestedDate"
                            class="w-full rounded-lg border py-2.5 pl-10 pr-3 text-sm outline-none transition focus:ring-4"
                            [ngClass]="isControlInvalid('requestedDate') ? 'border-red-400 focus:border-red-400 focus:ring-red-100' : 'border-slate-300 focus:border-indigo-500 focus:ring-indigo-100'" />
                    </div>
                    <small class="block text-xs text-red-600" *ngIf="isControlInvalid('requestedDate')">La date voulue est obligatoire.</small>
                </div>

                <div class="space-y-1">
                    <label for="timeSlot" class="block text-sm font-medium text-slate-700">Plage horaire</label>
                    <div class="relative">
                        <span class="pointer-events-none absolute left-3 top-1/2 -translate-y-1/2 text-slate-400">
                            <svg class="h-4 w-4" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="12" cy="12" r="9"/><path d="M12 7v5l3 3"/></svg>
                        </span>
                        <select
                            id="timeSlot"
                            formControlName="timeSlot"
                            class="w-full rounded-lg border bg-white py-2.5 pl-10 pr-3 text-sm outline-none transition focus:ring-4"
                            [ngClass]="isControlInvalid('timeSlot') ? 'border-red-400 focus:border-red-400 focus:ring-red-100' : 'border-slate-300 focus:border-indigo-500 focus:ring-indigo-100'">
                            <option value="" disabled>Choisir une plage horaire</option>
                            <option value="08:00-10:00">08:00 - 10:00</option>
                            <option value="10:00-12:00">10:00 - 12:00</option>
                            <option value="14:00-16:00">14:00 - 16:00</option>
                            <option value="16:00-18:00">16:00 - 18:00</option>
                        </select>
                    </div>
                    <small class="block text-xs text-red-600" *ngIf="isControlInvalid('timeSlot')">La plage horaire est obligatoire.</small>
                </div>

                <div class="space-y-1 sm:col-span-2">
                    <label for="quantity" class="block text-sm font-medium text-slate-700">Quantité</label>
                    <div class="relative">
                        <span class="pointer-events-none absolute left-3 top-1/2 -translate-y-1/2 text-slate-400">
                            <svg class="h-4 w-4" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M12 5v14M5 12h14" stroke-linecap="round"/></svg>
                        </span>
                        <input
                            id="quantity"
                            type="number"
                            min="1"
                            formControlName="quantity"
                            class="w-full rounded-lg border py-2.5 pl-10 pr-3 text-sm outline-none transition focus:ring-4"
                            [ngClass]="isControlInvalid('quantity') ? 'border-red-400 focus:border-red-400 focus:ring-red-100' : 'border-slate-300 focus:border-indigo-500 focus:ring-indigo-100'" />
                    </div>
                    <small class="block text-xs text-red-600" *ngIf="isControlInvalid('quantity')">La quantité minimal est 1.</small>
                </div>

                <div class="sm:col-span-2">
                    <button
                        type="submit"
                        [disabled]="loading"
                        class="inline-flex w-full items-center justify-center gap-2 rounded-lg bg-indigo-600 px-4 py-3 text-sm font-semibold text-white shadow-sm transition hover:bg-indigo-700 disabled:cursor-not-allowed disabled:opacity-70">
                        <svg *ngIf="!loading" class="h-4 w-4" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M3 12h18M12 3l9 9-9 9" stroke-linecap="round" stroke-linejoin="round"/></svg>
                        <span *ngIf="!loading">Envoyer la commande</span>
                        <span *ngIf="loading" class="inline-flex items-center gap-2">
                            <span class="h-4 w-4 animate-spin rounded-full border-2 border-white/40 border-t-white"></span>
                            Envoi en cours...
                        </span>
                    </button>
                </div>
            </form>
		</div>
	</div>

	<div class="fixed right-4 top-4 z-50 flex w-[22rem] max-w-[calc(100vw-2rem)] flex-col gap-3">
		<div
			*ngFor="let toast of toasts"
			class="rounded-xl border bg-white p-4 shadow-lg"
			[ngClass]="{
				'border-emerald-200': toast.type === 'success',
				'border-red-200': toast.type === 'error',
				'border-slate-200': toast.type === 'info'
			}">
			<div class="flex items-start gap-3">
				<div
					class="mt-0.5 rounded-full p-1"
					[ngClass]="{
						'bg-emerald-100 text-emerald-700': toast.type === 'success',
						'bg-red-100 text-red-700': toast.type === 'error',
						'bg-slate-100 text-slate-700': toast.type === 'info'
					}">
					<svg *ngIf="toast.type === 'success'" class="h-4 w-4" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="m5 12 5 5L20 7"/></svg>
					<svg *ngIf="toast.type === 'error'" class="h-4 w-4" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="m15 9-6 6M9 9l6 6"/></svg>
					<svg *ngIf="toast.type === 'info'" class="h-4 w-4" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="12" cy="12" r="9"/><path d="M12 10v6M12 7h.01"/></svg>
				</div>

				<div class="min-w-0 flex-1">
					<p class="text-sm font-semibold text-slate-800">{{ toast.title }}</p>
					<p class="mt-1 text-xs text-slate-600">{{ toast.message }}</p>
				</div>

				<button
					type="button"
					(click)="removeToast(toast.id)"
					class="text-slate-400 transition hover:text-slate-600"
					aria-label="Fermer">
					<svg class="h-4 w-4" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="m6 6 12 12M18 6 6 18"/></svg>
				</button>
			</div>
		</div>
	</div>
</div>
